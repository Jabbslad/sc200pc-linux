#
# Tuning file for the Samsung/SmartSens SC200PC (ACPI SSLC2000).
#
# Green row MUST be identity [0, 1, 0] — any cross-terms in the green
# row feed back through AWB and reintroduce a green cast. Saturation
# comes only from boosting R and B channels.
%YAML 1.1
---
version: 1
algorithms:
  - BlackLevel:
  - Awb:
  - Ccm:
      ccms:
        - ct: 2700
          ccm: [ 1.30, -0.25, -0.05,
                 0.00,  0.90,  0.00,
                -0.05, -0.25,  1.30 ]
        - ct: 4800
          ccm: [ 1.25, -0.20, -0.05,
                 0.00,  0.90,  0.00,
                -0.05, -0.20,  1.25 ]
        - ct: 6500
          ccm: [ 1.20, -0.15, -0.05,
                 0.00,  0.90,  0.00,
                -0.05, -0.15,  1.20 ]
  - Adjust:
  - Agc:
...
