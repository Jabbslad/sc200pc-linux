# Hide IPU7 ISYS capture nodes from WirePlumber's V4L2 monitor.
#
# The Intel IPU7 exposes ~32 raw ISYS capture nodes as /dev/videoN.
# These are internal ISP transport endpoints, not user-facing cameras.
# When WirePlumber's V4L2 monitor enumerates them it floods PipeWire
# with device objects and triggers a crash-loop that takes audio down.
#
# The SC200PC front camera is exposed through the libcamera monitor
# instead (via pipewire-libcamera + libcamera-sc200pc).

monitor.v4l2.rules = [
  {
    matches = [
      {
        device.name = "~v4l2_device.pci-0000_00_05.0*"
      }
    ]
    actions = {
      update-props = {
        device.disabled = true
      }
    }
  }
]
