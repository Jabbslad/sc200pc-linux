# SPDX-License-Identifier: CC0-1.0
# Initial tuning file for the Samsung/SmartSens SC200PC.
#
# This is intentionally conservative. The Windows driver gives us useful
# sensor-side register defaults, and those are already reflected in the
# kernel init table. It does not give us a libcamera-native software ISP
# tuning file, so this YAML is only a starting point for iteration.
#
# Current goals:
# - avoid falling back to simple/uncalibrated.yaml
# - provide a named anchor for SC200PC-specific tuning work
# - keep the algorithm set aligned with libcamera simple IPA defaults
# - recover some contrast and color while the sensor-side gain model
#   is still being decoded
%YAML 1.1
---
version: 1
algorithms:
  - BlackLevel:
      r: 32
      gr: 32
      gb: 32
      b: 32
  - Awb:
  - Ccm:
      # Experimental first pass derived from SC200PC AIQB r11
      # (0x0065/0x0019) rather than a semantically pinned Intel CMC export.
      #
      # Source selection:
      # - 6500 K anchor: SC200PC r11 bank 0
      # - 3200 K anchor: SC200PC r11 bank 1
      #
      # The raw r11 matrices are not drop-in libcamera CCMs, so these are
      # intentionally conservative row-normalized heuristics kept close to
      # the previous baseline. BlackLevel stays unchanged in this pass.
      ccms:
        - ct: 3200
          ccm: [ 2.30, -1.12, -0.18,
                 -0.10, 1.18, -0.08,
                  0.10, -0.40, 1.30 ]
        - ct: 6500
          ccm: [ 2.08, -0.94, -0.14,
                 -0.08, 1.14, -0.06,
                  0.06, -0.32, 1.26 ]
  - Adjust:
  - Agc:
...
