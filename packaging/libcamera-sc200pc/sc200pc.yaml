#
# Tuning file for the Samsung/SmartSens SC200PC (ACPI SSLC2000).
#
# BlackLevel from helper (512 = 8 at 10-bit, matching BLC register 0x3901).
# CCM adds saturation with all cross-terms negative to avoid green cast.
%YAML 1.1
---
version: 1
algorithms:
  - BlackLevel:
  - Awb:
  - Ccm:
      ccms:
        - ct: 2700
          ccm: [ 1.55, -0.50, -0.05,
                -0.05,  1.10, -0.05,
                -0.05, -0.50,  1.55 ]
        - ct: 4800
          ccm: [ 1.45, -0.40, -0.05,
                -0.05,  1.10, -0.05,
                -0.05, -0.40,  1.45 ]
        - ct: 6500
          ccm: [ 1.40, -0.35, -0.05,
                -0.05,  1.10, -0.05,
                -0.05, -0.35,  1.40 ]
  - Adjust:
  - Agc:
...
